<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft';
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
}

.back {
  margin-bottom: 15px;
  cursor: pointer;
  border: 2px solid #a855f7;
  padding: 8px 12px;
  border-radius: 10px;
}

.card {
  width: 100%;
  max-width: 700px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(168,85,247,0.3);
  overflow: hidden;
}

.bg {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

.content {
  padding: 20px;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.title-row img {
  width: 24px;
}

.invite {
  display: flex;
  margin-top: 15px;
}

.invite input {
  flex: 1;
  padding: 12px;
  border-radius: 10px 0 0 10px;
  border: 2px solid #a855f7;
}

.invite button {
  padding: 12px;
  border: none;
  background: #a855f7;
  color: white;
  border-radius: 0 10px 10px 0;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← Back</div>

<div class="card">
  <img id="bg" class="bg">
  <div class="content">
    <div class="title-row">
      <img id="heart">
      <h2 id="name">Loading...</h2>
    </div>
    <p id="desc">Loading server info...</p>

    <div class="invite">
      <input id="invite" readonly>
      <button onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script>
const servers = {
  "abc123": { id: 1, name: "Test Server", desc: "Best MultiCraft server ever" }
};

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if (servers[code]) {
  const s = servers[code];
  document.getElementById("name").innerText = s.name;
  document.getElementById("desc").innerText = s.desc;
  document.getElementById("invite").value = code;
  document.getElementById("bg").src = "bg" + s.id + ".png";
  document.getElementById("heart").src = "heart" + s.id + ".png";
} else {
  document.getElementById("name").innerText = "Server not found";
  document.getElementById("desc").innerText = "Invalid code";
}

function copyCode() {
  navigator.clipboard.writeText(document.getElementById("invite").value);
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
