<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft';
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
}

/* BUTTON */
.back {
  padding: 10px 16px;
  border-radius: 12px;
  border: 2px solid #a855f7;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  margin: 20px;
  cursor: pointer;
}

/* CARD */
.card {
  max-width: 1000px;
  margin: auto;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 15px 40px rgba(168,85,247,0.25);
}

.card.trending { border: 2px solid red; }
.card.recommended { border: 2px solid cyan; }

/* BADGES */
.badge {
  position: absolute;
  top: 15px;
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 12px;
  color: white;
}

.badge.trending {
  left: 15px;
  background: red;
}

.badge.recommended {
  left: 15px;
  top: 45px;
  background: linear-gradient(90deg, #00e5ff, #00ffa6);
  color: black;
}

/* IMAGE */
.bg {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

/* CONTENT */
.content {
  padding: 25px;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.title-row img {
  width: 26px;
}

/* AUTHOR NEW LINE */
.author {
  width: 100%;
  font-size: 14px;
  opacity: 0.7;
}

/* CHECK IMAGE */
.check-img {
  width: 16px;
  height: 16px;
}

/* DESC */
#desc {
  margin-top: 10px;
  opacity: 0.85;
}

/* INVITE */
.invite {
  display: flex;
  margin-top: 20px;
}

.invite input {
  flex: 1;
  padding: 12px;
  border: 2px solid #a855f7;
  border-right: none;
  border-radius: 12px 0 0 12px;
}

.invite button {
  padding: 12px;
  border: 2px solid #a855f7;
  background: #a855f7;
  color: white;
  border-radius: 0 12px 12px 0;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← Back</div>

<div id="card" class="card">
  <img id="bg" class="bg">

  <div class="content">
    <div class="title-row">
      <img id="heart">
      <h2 id="name"></h2>
      <img id="check" class="check-img" style="display:none;">
      <div id="author" class="author"></div>
    </div>

    <p id="desc"></p>

    <div class="invite">
      <input id="invite" readonly onclick="this.select()">
      <button onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* VERIFIED USERS */
const verifiedUsers = ["RedWorld"];

/* RECOMMENDED */
const recommendedServers = ["M5R9X1NY"];

/* SERVERS (FULL + CUSTOM SUPPORT) */
const servers = {
  "M5R9X1NY": {
    id:1,
    name:"Erratic SMP",
    desc:"Good MultiCraft SMP with no areas, and more very cool features.",
    author:"RedWorld"
  },
  "KAAYBNDP": {
    id:2,
    name:"Ronaldo Vs Messi",
    desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨",
    author:"Elder"
  },
  "MCSRVR03": {
    id:3,
    name:"FlatWorld",
    desc:"Creative Server",
    author:"Unknown"
  },
  "JLIVC3V9": {
    id:4,
    name:"New Types PvP",
    desc:"Awesome PvP server, with a lot fun features and gamemodes.",
    author:"Unknown"
  },
  "94D92LVD": {
    id:5,
    name:"SMP12",
    desc:"In here, it's your job to have fun! The world open, PVP; it's a place where you can do anything!",
    author:"Jared12"
  },
  "XX9IXQ6H": {
    id:6,
    name:"Stone Simulator",
    desc:"In here, we live underground! Also, we buy items from The Shop! With currencies such as Stone, Cobblestone, and more!",
    author:"Jared12"
  },
  "QVZACNG5": {
    id:7,
    name:"Parkour Cubicles",
    desc:"In here, YOU will try to beat the impossible 36 cubicles of the server to escape!",
    author:"Jared12"
  }
};

/* IMAGE FALLBACK */
function loadImage(img, base){
  const formats = ["webp","png","PNG","WEBP"];
  let i = 0;
  function next(){
    if(i >= formats.length) return;
    img.src = base + "." + formats[i];
    i++;
  }
  img.onerror = next;
  next();
}

/* LOAD */
const code = new URLSearchParams(location.search).get("code");
const s = servers[code];

if(!s){
  document.getElementById("name").innerText = "Server not found";
  throw "invalid";
}

/* ELEMENTS */
const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");
const inviteEl = document.getElementById("invite");
const authorEl = document.getElementById("author");
const checkEl = document.getElementById("check");
const bgEl = document.getElementById("bg");
const heartEl = document.getElementById("heart");
const card = document.getElementById("card");

/* TEXT */
nameEl.innerText = s.name;
descEl.innerText = s.desc;
inviteEl.value = code;
authorEl.innerText = "by " + s.author;

/* CHECKMARK */
if(verifiedUsers.includes(s.author)){
  checkEl.src = "assets/check.png"; /* ← put image here */
  checkEl.style.display = "inline";
}

/* IMAGES */
if(s.bg) bgEl.src = s.bg;
else loadImage(bgEl, "bgs/bg" + s.id);

if(s.heart) heartEl.src = s.heart;
else loadImage(heartEl, "hearts/h" + s.id);

/* BADGES */
const ref = doc(db,"servers",code);
getDoc(ref).then(snap=>{
  const visits = snap.exists()?snap.data().visits||0:0;

  if(recommendedServers.includes(code)){
    card.classList.add("recommended");

    const b=document.createElement("div");
    b.className="badge recommended";
    b.innerText="RECOMMENDED";
    card.appendChild(b);
  }
  else if(visits >= 5){
    card.classList.add("trending");

    const b=document.createElement("div");
    b.className="badge trending";
    b.innerText="TRENDING";
    card.appendChild(b);
  }
});

/* COPY */
window.copyCode = ()=>{
  navigator.clipboard.writeText(inviteEl.value);
};

/* BACK */
window.goBack = ()=>{
  location.href = "index.html";
};

document.title = s.name + " • MCspace";
</script>

</body>
</html>
