<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
@font-face {
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body {
  margin:0;
  font-family:'MultiCraft';
  background:radial-gradient(circle at top,#fff,#f3e8ff);
}

.back {
  margin:20px;
  padding:10px 16px;
  border-radius:12px;
  background:#a855f7;
  color:white;
  cursor:pointer;
}

.card {
  max-width:1000px;
  margin:auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
}

.bg {width:100%;aspect-ratio:16/9;object-fit:cover;}

.content {padding:25px;}

.title-row {display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

.author {width:100%;opacity:0.7;}

.invite {display:flex;margin-top:20px;}

.invite input {
  flex:1;
  padding:10px;
  border:2px solid #a855f7;
}

.invite button {
  background:#a855f7;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="back" onclick="location.href='index.html'">← Back</div>

<div class="card">
  <img id="bg" class="bg">

  <div class="content">
    <div class="title-row">
      <img id="heart" width="26">
      <h2 id="name"></h2>
    </div>

    <div id="author" class="author"></div>
    <p id="desc"></p>

    <div class="invite">
      <input id="invite" readonly>
      <button onclick="copy()">Copy</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

initializeApp(firebaseConfig);

/* ✅ ALL 7 SERVERS */
const servers={
"M5R9X1NY":{name:"Erratic SMP",author:"RedWorld",desc:"Good SMP",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
"KAAYBNDP":{name:"Ronaldo Vs Messi",author:"Elder",desc:"PvP",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
"MCSRVR03":{name:"FlatWorld",author:"Unknown",desc:"Creative",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
"JLIVC3V9":{name:"New PvP",author:"Unknown",desc:"Modes",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
"94D92LVD":{name:"SMP12",author:"Jared12",desc:"Open SMP",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
"XX9IXQ6H":{name:"Stone Simulator",author:"Jared12",desc:"Mining",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
"QVZACNG5":{name:"Parkour Cubicles",author:"Jared12",desc:"Parkour",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
};

const code=new URLSearchParams(location.search).get("code");
const s=servers[code];

if(!s){
  document.getElementById("name").innerText="Server not found";
}else{
  name.innerText=s.name;
  author.innerText="by "+s.author;
  desc.innerText=s.desc;
  invite.value=code;

  bg.src=s.bg;
  heart.src=s.heart;
}

window.copy=()=>{
  navigator.clipboard.writeText(invite.value);
};
</script>

</body>
</html>
