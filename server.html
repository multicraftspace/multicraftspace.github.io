<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace Server</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: #ffffff;
  color: #2d0b4e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 600px;
  border: 2px solid #a855f7;
  border-radius: 18px;
  overflow: hidden;
  background: linear-gradient(145deg, #ffffff, #f3e8ff);
  box-shadow: 0 15px 40px rgba(168,85,247,0.3);
}

.bg {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content {
  padding: 20px;
}

h2 {
  margin: 0 0 10px;
}

p {
  margin: 0 0 15px;
}

.invite-box {
  display: flex;
  gap: 0;
}

.invite-box input {
  flex: 1;
  padding: 12px;
  border: 2px solid #a855f7;
  border-radius: 10px 0 0 10px;
  font-family: 'MultiCraft';
}

.invite-box button {
  padding: 12px 15px;
  border: 2px solid #a855f7;
  border-left: none;
  background: #a855f7;
  color: white;
  cursor: pointer;
  border-radius: 0 10px 10px 0;
  transition: 0.2s;
}

.invite-box button:hover {
  background: #9333ea;
}

.invite-box button:active {
  transform: scale(0.9);
}
</style>
</head>

<body>

<div class="container">
  <img id="bg" class="bg" src="">
  
  <div class="content">
    <h2 id="name">Loading...</h2>
    <p id="desc">Please wait</p>

    <div class="invite-box">
      <input id="invite" readonly>
      <button onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script>
// Fake database (you can expand this later)
const servers = {
  "abc123": {
    id: 1,
    name: "Test Server",
    desc: "Best MultiCraft server ever"
  }
};

// Get code from URL
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

// Load server
if (servers[code]) {
  const server = servers[code];

  document.getElementById("name").innerText = server.name;
  document.getElementById("desc").innerText = server.desc;
  document.getElementById("invite").value = code;

  // Load images using your system
  document.getElementById("bg").src = "bg" + server.id + ".png";

} else {
  document.getElementById("name").innerText = "Server not found";
  document.getElementById("desc").innerText = "Invalid invite code";
}

// Copy function (modern)
function copyCode() {
  const text = document.getElementById("invite").value;

  navigator.clipboard.writeText(text).then(() => {
    alert("Copied!");
  });
}
</script>

</body>
</html>
