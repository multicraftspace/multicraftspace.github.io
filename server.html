<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body {
  margin:0;
  font-family:'MultiCraft', sans-serif;
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
}

.back,.copy-btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  margin:20px;
}

.card{
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(168,85,247,0.25);
}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{padding:25px;}

.title-row{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

.author{
  width:100%;
  opacity:0.7;
}

.check{
  width:16px;
}

.invite{
  display:flex;
  margin-top:20px;
}

.invite input{
  flex:1;
  padding:12px;
  border:2px solid #a855f7;
  border-right:none;
  border-radius:12px 0 0 12px;
}

.copy-btn{
  border-radius:0 12px 12px 0;
}
</style>
</head>

<body>

<div class="back" onclick="location.href='index.html'">← Back</div>

<div class="card">
  <img id="bg" class="bg">
  <div class="content">
    <div class="title-row">
      <img id="heart" width="24">
      <h2 id="name">Loading...</h2>
      <img id="check" class="check" style="display:none;">
      <div id="author" class="author"></div>
    </div>

    <p id="desc"></p>

    <div class="invite">
      <input id="invite" readonly>
      <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// elements
const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");
const authorEl = document.getElementById("author");
const inviteEl = document.getElementById("invite");
const bgEl = document.getElementById("bg");
const heartEl = document.getElementById("heart");
const checkEl = document.getElementById("check");

// get code from URL
const code = new URLSearchParams(window.location.search).get("code");

if (!code) {
  nameEl.innerText = "No code provided";
} else {
  loadServer(code);
}

async function loadServer(code) {
  try {
    const ref = doc(db, "servers", code);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      nameEl.innerText = "Server not found";
      descEl.innerText = "Invalid code.";
      return;
    }

    const server = snap.data();

    nameEl.innerText = server.name;
    descEl.innerText = server.desc;
    authorEl.innerText = "by " + server.author;
    inviteEl.value = code;

    bgEl.src = server.bg;
    heartEl.src = server.heart;

    if (server.author === "RedWorld") {
      checkEl.src = "assets/check.png";
      checkEl.style.display = "inline";
    }

    document.title = server.name + " • MCspace";

  } catch (err) {
    console.error(err);
    nameEl.innerText = "Error loading server";
  }
}

window.copyCode = function () {
  navigator.clipboard.writeText(inviteEl.value)
    .then(() => alert("Copied!"))
    .catch(() => alert("Failed to copy"));
};
</script>

</body>
</html>
