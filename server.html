<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=https://mtcspace.com/m">
<title>Server</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
}

/* BACK */
.back{
  margin:20px;
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
}

/* CARD */
.card{
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(168,85,247,0.25);
  border:2px solid transparent;
}

/* BADGES */
.card.trending{border:2px solid red;}
.card.recommended{border:2px solid cyan;}

.badge{
  position:absolute;
  margin:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
}

.badge.trending{background:red;color:white;}
.badge.recommended{
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}

/* IMAGE */
.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{padding:20px;}

.author{
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:5px;
  opacity:0.7;
}

.pfp{
  width:22px;
  height:22px;
  border-radius:50%;
}

.check{width:16px;}

/* BUTTONS */
.btn{
  padding:10px 14px;
  border-radius:10px;
  border:2px solid #a855f7;
  background:#a855f7;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.fav{
  font-size:20px;
  cursor:pointer;
}

/* COMMENTS */
.comments{
  max-width:900px;
  margin:20px auto;
}

.comment-box{
  display:flex;
  gap:10px;
}

.comment-box input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:2px solid #a855f7;
}

.comment{
  background:white;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}

.comment-author{
  font-size:12px;
  opacity:0.7;
}

.author-badge{
  color:red;
  font-size:11px;
}
</style>
</head>

<body>

<div class="back" onclick="location.href='index.html'">← Back</div>

<div id="card" class="card">
  <img id="bg" class="bg">
  <div class="content">
    <h2 id="name"></h2>

    <div id="author" class="author"></div>

    <p id="desc"></p>

    <div class="actions">
      <span id="fav" class="fav"></span>
      <button class="btn" onclick="like()">👍 <span id="likes">0</span></button>
      <button class="btn" onclick="dislike()">👎 <span id="dislikes">0</span></button>
    </div>
  </div>
</div>

<!-- COMMENTS -->
<div class="comments">
  <h3>Comments</h3>

  <div class="comment-box">
    <input id="commentInput" placeholder="Write a comment...">
    <button class="btn" onclick="sendComment()">Send</button>
  </div>

  <div id="commentsList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc,
  updateDoc, increment,
  collection, addDoc, getDocs, query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega"
});

const db = getFirestore(app);

const code = new URLSearchParams(location.search).get("code");

let serverData;
let authorData;

/* LOAD SERVER */
async function load(){
  const snap = await getDoc(doc(db,"servers",code));
  if(!snap.exists()) return;

  serverData = snap.data();

  document.getElementById("name").innerText = serverData.name;
  document.getElementById("desc").innerText = serverData.desc;
  document.getElementById("bg").src = serverData.bg;

  document.getElementById("likes").innerText = serverData.likes || 0;
  document.getElementById("dislikes").innerText = serverData.dislikes || 0;

  /* AUTHOR */
  const userSnap = await getDoc(doc(db,"users",serverData.author));
  authorData = userSnap.exists()?userSnap.data():{};

  document.getElementById("author").innerHTML = `
    <img class="pfp" src="${authorData.pfpURL && authorData.pfpURL!=="no"?authorData.pfpURL:"assets/default.png"}">
    <span onclick="openProfile()" style="cursor:pointer">${serverData.author}</span>
    ${authorData.verified?'<img class="check" src="assets/check.png">':''}
  `;

  /* FAVORITE */
  const favs = JSON.parse(localStorage.getItem("favs")||"[]");
  fav.innerText = favs.includes(code) ? "❤️" : "🤍";

  /* TRENDING / RECOMMENDED */
  const growth = (serverData.visits||0)-(serverData.lastVisits||0);
  if(growth>5) card.classList.add("trending");

  if(["M5R9X1NY"].includes(code)) card.classList.add("recommended");

  loadComments();
}

/* FAVORITE */
fav.onclick = ()=>{
  let favs = JSON.parse(localStorage.getItem("favs")||"[]");
  favs.includes(code)?favs=favs.filter(x=>x!==code):favs.push(code);
  localStorage.setItem("favs",JSON.stringify(favs));
  fav.innerText = favs.includes(code) ? "❤️" : "🤍";
};

/* LIKE / DISLIKE */
window.like = async ()=>{
  await updateDoc(doc(db,"servers",code),{likes:increment(1)});
  likes.innerText++;
};

window.dislike = async ()=>{
  await updateDoc(doc(db,"servers",code),{dislikes:increment(1)});
  dislikes.innerText++;
};

/* COMMENTS */
async function loadComments(){
  const q = query(collection(db,"comments"), where("server","==",code));
  const snap = await getDocs(q);

  commentsList.innerHTML="";

  snap.forEach(docSnap=>{
    const c = docSnap.data();

    const div = document.createElement("div");
    div.className="comment";

    div.innerHTML=`
      <div class="comment-author">
        ${c.author}
        ${c.author===serverData.author?'<span class="author-badge">AUTHOR</span>':''}
      </div>
      <div>${c.content}</div>
    `;

    commentsList.appendChild(div);
  });
}

/* SEND COMMENT */
window.sendComment = async ()=>{
  const user = localStorage.getItem("user");
  if(!user) return alert("Sign up first");

  if(!commentInput.value.trim()) return;

  await addDoc(collection(db,"comments"),{
    content: commentInput.value,
    author: user,
    server: code,
    likes:0,
    dislikes:0
  });

  commentInput.value="";
  loadComments();
};

/* PROFILE */
window.openProfile = ()=>{
  location.href = "profiles.html?u="+serverData.author;
};

load();
</script>

</body>
</html>
