<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft',sans-serif;
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
}

/* BACK BUTTON */
.back{
  margin:20px;
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
  display:inline-block;
}
.back:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}
.back:active{transform:scale(0.9);}

/* CARD */
.card{
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(168,85,247,0.25);
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{padding:25px;}

.title-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.author{
  width:100%;
  opacity:0.7;
  font-size:14px;
}

.check{width:16px;}

/* INVITE */
.invite-label{
  margin-top:20px;
  opacity:0.7;
  font-size:14px;
}

.invite{
  display:flex;
  margin-top:6px;
}

.invite input{
  flex:1;
  padding:12px;
  border:2px solid #a855f7;
  border-right:none;
  border-radius:12px 0 0 12px;
  outline:none;
  font-family:'MultiCraft';
}

/* COPY BUTTON FIX */
.copy-btn{
  padding:12px 16px;
  border-radius:0 12px 12px 0;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
}
.copy-btn:hover{
  transform:scale(1.05);
}
.copy-btn:active{
  transform:scale(0.9);
}
</style>
</head>

<body>

<div class="back" onclick="location.href='index.html'">← Back</div>

<div class="card">
  <img id="bg" class="bg">
  <div class="content">

    <div class="title-row">
      <img id="heart" width="24">
      <h2 id="name">Loading...</h2>
      <img id="check" class="check" style="display:none;">
      <div id="author"></div>
    </div>

    <p id="desc"></p>

    <div class="invite-label">Invite Code</div>

    <div class="invite">
      <input id="invite" readonly onclick="this.select()">
      <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* FULL SERVER DATA */
const servers = {
  "M5R9X1NY": {
    name:"Erratic SMP",
    desc:"Good MultiCraft SMP with survival gameplay, no restrictions, active community and fun exploration.",
    author:"RedWorld",
    bg:"bgs/bg1.png",
    heart:"hearts/hpvp.png"
  },
  "KAAYBNDP": {
    name:"Ronaldo Vs Messi",
    desc:"BEST SERVER 👌 Parkour, PvP, BedWars, Manhunt, Bridging, Axe PvP and many more gamemodes.",
    author:"Elder",
    bg:"bgs/bg2.png",
    heart:"hearts/hpvp.png"
  },
  "MCSRVR03": {
    name:"FlatWorld",
    desc:"Creative sandbox server where you can build anything in a flat world without limits.",
    author:"Unknown",
    bg:"bgs/bg3.png",
    heart:"hearts/hc.png"
  },
  "JLIVC3V9": {
    name:"New Types PvP",
    desc:"Unique PvP server with custom combat styles and multiple fun competitive modes.",
    author:"Unknown",
    bg:"bgs/bg4.png",
    heart:"hearts/hpvp.png"
  },
  "94D92LVD": {
    name:"SMP12",
    desc:"Open survival SMP where you can build, fight, explore and play freely with others.",
    author:"Jared12",
    bg:"bgs/bg5.png",
    heart:"hearts/hpvp.png"
  },
  "XX9IXQ6H": {
    name:"Stone Simulator",
    desc:"Underground economy server: mine stone, trade resources and progress through systems.",
    author:"Jared12",
    bg:"bgs/bg6.png",
    heart:"hearts/hpvp.png"
  },
  "QVZACNG5": {
    name:"Parkour Cubicles",
    desc:"Try to complete 36 impossible parkour challenges and escape the cube world.",
    author:"Jared12",
    bg:"bgs/bg7.png",
    heart:"hearts/hpvp.png"
  }
};

const verifiedUsers=["RedWorld"];

const code = new URLSearchParams(location.search).get("code");
const s = servers[code];

const nameEl=document.getElementById("name");
const descEl=document.getElementById("desc");
const authorEl=document.getElementById("author");
const inviteEl=document.getElementById("invite");
const bgEl=document.getElementById("bg");
const heartEl=document.getElementById("heart");
const checkEl=document.getElementById("check");

if(!s){
  nameEl.innerText="Server not found";
  descEl.innerText="Invalid code.";
} else {
  load();
}

function load(){
  nameEl.innerText=s.name;
  descEl.innerText=s.desc;
  authorEl.innerText="by "+s.author;
  inviteEl.value=code;

  bgEl.src=s.bg;
  heartEl.src=s.heart;

  if(verifiedUsers.includes(s.author)){
    checkEl.src="assets/check.png";
    checkEl.style.display="inline";
  }

  document.title=s.name+" • MCspace";
}

/* COPY FIX */
window.copyCode=function(){
  navigator.clipboard.writeText(inviteEl.value);
  const btn=document.querySelector(".copy-btn");
  btn.innerText="Copied!";
  setTimeout(()=>btn.innerText="Copy",1200);
};
</script>

</body>
</html>
