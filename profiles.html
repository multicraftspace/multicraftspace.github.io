<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile • MTCSpace</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
}
.btn:hover{
  transform:translateY(-2px);
}

/* PROFILE */
.profile{
  max-width:900px;
  margin:30px auto;
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 15px 40px rgba(168,85,247,0.25);
  text-align:center;
  animation:fadeIn .4s;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.pfp{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #a855f7;
}

.name{
  font-size:22px;
  margin-top:10px;
}

.check{
  width:18px;
  vertical-align:middle;
}

.desc{
  margin-top:10px;
  opacity:0.7;
}

textarea{
  width:100%;
  border-radius:12px;
  border:2px solid #a855f7;
  padding:10px;
  font-family:'MultiCraft';
  margin-top:10px;
}

.subs{
  margin-top:10px;
  font-size:14px;
  opacity:0.7;
}

/* SERVERS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  border-radius:20px;
  background:white;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(168,85,247,0.2);
  cursor:pointer;
  transition:0.25s;
}
.card:hover{
  transform:translateY(-5px);
}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{
  padding:10px;
}

.nameS{
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="location.href='index.html'" class="btn">← Back</div>
</div>

<div class="profile">
  <img id="pfp" class="pfp">
  <div class="name" id="name"></div>
  <div class="subs" id="subs"></div>

  <div id="desc" class="desc"></div>

  <textarea id="editDesc" placeholder="Edit your description..." style="display:none;"></textarea>
  <button id="saveBtn" class="btn" style="display:none;">Save</button>

  <br><br>
  <button id="subBtn" class="btn">Subscribe</button>
</div>

<div id="servers" class="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, updateDoc,
  increment, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
});

const db = getFirestore(app);

/* GET USER FROM URL */
const username = new URLSearchParams(location.search).get("u")?.replace("@","");

const currentUser = localStorage.getItem("user");

/* ELEMENTS */
const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");
const editDesc = document.getElementById("editDesc");
const saveBtn = document.getElementById("saveBtn");
const pfpEl = document.getElementById("pfp");
const subsEl = document.getElementById("subs");
const subBtn = document.getElementById("subBtn");

/* LOAD PROFILE */
async function load(){
  const ref = doc(db,"users",username);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    nameEl.innerText="User not found";
    return;
  }

  const d = snap.data();

  nameEl.innerHTML = username +
    (d.verified ? ' <img src="assets/check.png" class="check">' : '');

  descEl.innerText = d.description || "No description.";
  subsEl.innerText = (d.subs || 0) + " subscribers";

  pfpEl.src = d.pfpURL && d.pfpURL !== "no"
    ? d.pfpURL
    : "assets/default.png";

  /* OWNER EDIT */
  if(currentUser === username){
    editDesc.style.display="block";
    saveBtn.style.display="inline-block";
    editDesc.value = d.description || "";
  }
}

/* SAVE DESC */
saveBtn.onclick = async ()=>{
  await updateDoc(doc(db,"users",username),{
    description: editDesc.value
  });
  location.reload();
};

/* SUBSCRIBE */
subBtn.onclick = async ()=>{
  if(!currentUser) return alert("Login required");

  await updateDoc(doc(db,"users",username),{
    subs: increment(1)
  });

  location.reload();
};

/* LOAD USER SERVERS */
async function loadServers(){
  const snap = await getDocs(collection(db,"servers"));
  const container = document.getElementById("servers");

  snap.forEach(d=>{
    const s = d.data();
    if(s.author !== username) return;

    const card = document.createElement("div");
    card.className="card";
    card.onclick=()=>location.href="server.html?code="+d.id;

    card.innerHTML=`
      <img class="bg" src="${s.bg || 'bgs/bg1.png'}">
      <div class="content">
        <div class="nameS">${s.name}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

load();
loadServers();
</script>

</body>
</html>
