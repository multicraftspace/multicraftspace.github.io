<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTCSpace</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{height:40px;}

.search{
  padding:10px;
  border-radius:12px;
  border:2px solid #a855f7;
  width:260px;
  font-family:'MultiCraft';
}

/* BUTTON */
.btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transition:0.2s;
}
.card:hover{transform:translateY(-5px);}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{padding:12px;}

.author{
  font-size:12px;
  opacity:0.7;
  display:flex;
  align-items:center;
  gap:5px;
}

.author img{
  width:16px;
  height:16px;
  border-radius:50%;
}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
}

.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:350px;
  position:relative;
}

/* CLOSE BUTTON */
.close{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:18px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:2px solid #a855f7;
  font-family:'MultiCraft';
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MTCSpace</div>
  </div>

  <input id="search" class="search" placeholder="Search...">

  <div>
    <button class="btn" onclick="openAdd()">+ Add my server</button>
    <button class="btn" onclick="contact()">📩</button>
    <button id="authBtn" class="btn" onclick="openAuth()">Sign Up</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">
  <div class="modal-box">
    <div class="close" onclick="closeAuth()">✖</div>

    <h3>Account</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <input id="pfp" placeholder="Profile Picture URL (optional)">

    <button class="btn" onclick="signup()">Sign Up</button>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, doc, getDoc,
setDoc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FULL CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
});

const db = getFirestore(app);

let allServers = [];
const currentUser = localStorage.getItem("user");

if(currentUser){
  authBtn.innerText = currentUser;
}

/* AUTH */
window.openAuth = () => authModal.style.display = "flex";
window.closeAuth = () => authModal.style.display = "none";

window.signup = async () => {
  try{
    const u = user.value.trim();
    const p = pass.value.trim();
    const pic = pfp.value.trim() || "no";

    if(!u || !p) return alert("Fill fields");

    const ref = doc(db,"users",u);
    if((await getDoc(ref)).exists()) return alert("Username taken");

    await setDoc(ref,{
      password:p,
      pfp:pic,
      subs:0,
      desc:""
    });

    localStorage.setItem("user",u);
    location.reload();
  }catch(e){
    console.error(e);
    alert("Signup error");
  }
};

window.login = async () => {
  try{
    const snap = await getDoc(doc(db,"users",user.value));
    if(!snap.exists()) return alert("User not found");

    if(snap.data().password !== pass.value){
      return alert("Wrong password");
    }

    localStorage.setItem("user",user.value);
    location.reload();
  }catch(e){
    console.error(e);
    alert("Login error");
  }
};

/* LOAD SERVERS */
async function load(){
  try{
    const snap = await getDocs(collection(db,"servers"));

    allServers = [];

    snap.forEach(d=>{
      const s = d.data();
      s.code = d.id;
      allServers.push(s);
    });

    render(allServers);
  }catch(e){
    console.error("LOAD ERROR:", e);
  }
}

/* RENDER */
async function render(list){
  grid.innerHTML = "";

  for(const s of list){
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="bg" src="${s.bg || 'bgs/bg1.png'}">
      <div class="content">
        <b>${s.name || "No name"}</b>
        <div class="author">by ${s.author || "Unknown"}</div>
        <div class="desc">${s.desc || ""}</div>

        <div class="actions">
          <span>${s.visits || 0} visits</span>
          <button class="btn" onclick="play('${s.code}')">Play</button>
        </div>
      </div>
    `;

    grid.appendChild(card);
  }
}

/* SEARCH */
search.oninput = () => {
  const q = search.value.toLowerCase();
  render(allServers.filter(s =>
    (s.name || "").toLowerCase().includes(q)
  ));
};

/* PLAY */
const COOLDOWN = 600000;

window.play = async (code) => {
  try{
    const key = "visit_" + code;
    const now = Date.now();

    if(!localStorage.getItem(key) || now - localStorage.getItem(key) > COOLDOWN){
      await updateDoc(doc(db,"servers",code),{
        visits: increment(1)
      });
      localStorage.setItem(key, now);
    }

    location.href = "server.html?code=" + code;
  }catch(e){
    console.error(e);
  }
};

/* BUTTONS */
window.openAdd = () => {
  if(!localStorage.getItem("user")){
    openAuth();
  }else{
    location.href = "mailto:add@mtcspace.com";
  }
};

window.contact = () => {
  location.href = "mailto:contact@mtcspace.com?subject=I need help";
};

load();
</script>

</body>
</html>
