<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTCSpace</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
  gap:15px;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{height:40px;}

.search{
  padding:10px 14px;
  border-radius:12px;
  border:2px solid #a855f7;
  width:280px;
  font-family:'MultiCraft';
  transition:0.2s;
}
.search:focus{
  box-shadow:0 0 12px rgba(168,85,247,0.5);
}

/* BUTTON */
.btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.2s;
}
.btn:hover{
  transform:translateY(-2px) scale(1.05);
}
.btn:active{
  transform:scale(0.9);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  border:2px solid transparent;
  transition:0.2s;
  position:relative;
}
.card:hover{
  transform:translateY(-6px);
}

/* BADGES */
.card.trending{border-color:red;}
.card.recommended{border-color:cyan;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  font-size:11px;
  padding:5px 8px;
  border-radius:10px;
}
.badge.trending{background:red;color:white;}
.badge.recommended{background:cyan;color:black;}

/* CONTENT */
.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}
.content{padding:12px;}

.author{
  font-size:12px;
  opacity:0.7;
  display:flex;
  align-items:center;
  gap:5px;
}
.author img{
  width:16px;
  height:16px;
  border-radius:50%;
}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
}

.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.fav{
  cursor:pointer;
  font-size:16px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}
.modal-box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:320px;
}
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:2px solid #a855f7;
  margin-bottom:10px;
  font-family:'MultiCraft';
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MTCSpace</div>
  </div>

  <input id="search" class="search" placeholder="Search servers...">

  <div>
    <button class="btn" onclick="openAdd()">+ Add my server</button>
    <button class="btn" onclick="contact()">📩</button>
    <button id="authBtn" class="btn" onclick="openAuth()">Sign Up</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<!-- AUTH -->
<div id="authModal" class="modal">
  <div class="modal-box">
    <h3>Account</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <input id="pfp" placeholder="Profile Picture URL (optional)">
    <button class="btn" onclick="signup()">Sign Up</button>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, doc, getDoc,
setDoc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FULL CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
});

const db = getFirestore(app);

let allServers=[];
let currentUser=localStorage.getItem("user");

if(currentUser) authBtn.innerText=currentUser;

/* AUTH */
window.signup=async()=>{
  const u=user.value.trim();
  const p=pass.value.trim();
  const pic=pfp.value.trim()||"no";

  if(!u||!p) return alert("Fill fields");

  const ref=doc(db,"users",u);
  if((await getDoc(ref)).exists()) return alert("Username taken");

  await setDoc(ref,{
    password:p,
    pfp:pic,
    subs:0,
    desc:""
  });

  localStorage.setItem("user",u);
  location.reload();
};

window.login=async()=>{
  const snap=await getDoc(doc(db,"users",user.value));
  if(!snap.exists()) return alert("No user");
  if(snap.data().password!==pass.value) return alert("Wrong password");

  localStorage.setItem("user",user.value);
  location.reload();
};

window.openAuth=()=>authModal.style.display="flex";

/* LOAD SERVERS */
async function load(){
  const snap=await getDocs(collection(db,"servers"));
  allServers=[];

  snap.forEach(d=>{
    const s=d.data();
    s.code=d.id;
    s.growth=(s.visits||0)-(s.lastVisits||0);
    allServers.push(s);
  });

  render(allServers);
}

/* RENDER */
async function render(list){
  grid.innerHTML="";

  const maxGrowth=Math.max(...list.map(s=>s.growth||0),1);

  for(const s of list){
    const userSnap=await getDoc(doc(db,"users",s.author));
    const pfp=userSnap.exists() && userSnap.data().pfp!=="no"
      ?userSnap.data().pfp
      :"assets/default.png";

    const trending=s.growth>maxGrowth*0.6;
    const favs=JSON.parse(localStorage.getItem("favs")||"[]");

    const card=document.createElement("div");
    card.className="card"+(trending?" trending":"");

    card.innerHTML=`
      ${trending?'<div class="badge trending">🔥 TRENDING</div>':''}
      <img class="bg" src="${s.bg}">
      <div class="content">
        <b>${s.name}</b>

        <div class="author">
          <img src="${pfp}">
          ${s.author}
        </div>

        <div class="desc">${s.desc}</div>

        <div class="actions">
          <span>${s.visits||0} visits</span>
          <div>
            <span class="fav" onclick="fav('${s.code}')">
              ${favs.includes(s.code)?"❤️":"🤍"}
            </span>
            <button class="btn" onclick="play('${s.code}')">Play</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }
}

/* FAVORITES */
window.fav=(c)=>{
  let f=JSON.parse(localStorage.getItem("favs")||"[]");
  f.includes(c)?f=f.filter(x=>x!==c):f.push(c);
  localStorage.setItem("favs",JSON.stringify(f));
  render(allServers);
};

/* SEARCH */
search.oninput=()=>{
  const q=search.value.toLowerCase();
  render(allServers.filter(s=>s.name.toLowerCase().includes(q)));
};

/* PLAY */
const COOLDOWN=600000;
window.play=async(c)=>{
  const key="visit_"+c;
  const now=Date.now();

  if(!localStorage.getItem(key)||now-localStorage.getItem(key)>COOLDOWN){
    await updateDoc(doc(db,"servers",c),{visits:increment(1)});
    localStorage.setItem(key,now);
  }

  location.href="server.html?code="+c;
};

window.openAdd=()=>{
  if(!localStorage.getItem("user")) return openAuth();
  location.href="mailto:add@mtcspace.com";
};

window.contact=()=>{
  location.href="mailto:contact@mtcspace.com?subject=I need help";
};

load();
</script>
</body>
</html>
