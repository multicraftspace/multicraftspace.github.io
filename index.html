<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  color: #2d0b4e;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  border-bottom: 2px solid #a855f7;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  height: 40px;
}

/* ADD BUTTON */
.add-btn {
  padding: 10px 16px;
  border-radius: 12px;
  border: 2px solid #a855f7;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

.add-btn:hover {
  transform: scale(1.05);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* CARD FIX */
.card {
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 15px 35px rgba(168,85,247,0.25);
  transition: 0.3s;
  border: 2px solid transparent;

  display: flex;
  flex-direction: column;
  height: 100%;
}

.card.trending {
  border: 2px solid red;
  box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

.bg {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

/* CONTENT FIX */
.content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.title-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* DESCRIPTION CLAMP */
.desc {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 5px;

  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* BUTTON FIX */
.actions {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.visits {
  font-size: 12px;
  opacity: 0.7;
}

/* PLAY BUTTON */
.play-btn {
  padding: 10px 16px;
  border-radius: 12px;
  border: 2px solid #a855f7;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
}

.play-btn:hover {
  transform: translateY(-2px) scale(1.05);
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.4);
}

.modal-box {
  background: white;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  max-width: 320px;
}

.close-btn {
  margin-top: 15px;
  padding: 10px 16px;
  border-radius: 12px;
  border: none;
  background: #a855f7;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png">
    <div>MCspace</div>
  </div>

  <button class="add-btn" onclick="openModal()">+ Add my server</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Want to add your server?</h3>
    <p>DM @rwor1d in Discord to add your server.</p>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SERVERS */
let servers = [
  { id: 1, name: "Erratic SMP", desc: "Good MultiCraft SMP with no areas, and more very cool features.", code: "M5R9X1NY" },
  { id: 2, name: "Ronaldo Vs Messi", desc: "BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨", code: "KAAYBNDP" },
  { id: 3, name: "FlatWorld", desc: "Creative Server", code: "MCSRVR03" },
  { id: 4, name: "New Types PvP", desc: "Awesome PvP server, with a lot fun features and gamemodes.", code: "JLIVC3V9" },
  { id: 5, name: "SMP12", desc: "In here, it's your job to have fun! The world open, PVP; it's a place where you can do anything!", code: "94D92LVD" },
  { id: 6, name: "Stone Simulator", desc: "In here, we live underground! Also, we buy items from The Shop! With currencies such as Stone, Cobblestone, and more!", code: "XX9IXQ6H" },
  { id: 7, name: "Parkour Cubicles", desc: "In here, YOU will try to beat the impossible 36 cubicles of the server to escape!", code: "QVZACNG5" }
];

/* LOAD VISITS */
async function loadVisits(server) {
  const ref = doc(db, "servers", server.code);
  const snap = await getDoc(ref);
  server.visits = snap.exists() ? (snap.data().visits || 0) : 0;
}

/* INIT */
async function init() {
  await Promise.all(servers.map(loadVisits));

  servers.sort((a,b) => b.visits - a.visits);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  servers.forEach(server => {
    const trending = server.visits >= 5;

    const card = document.createElement("div");
    card.className = "card" + (trending ? " trending" : "");

    card.innerHTML = `
      <img class="bg" src="bg${server.id}.png" onerror="this.src='bg1.png'">
      <div class="content">
        <div class="title-row">
          <img src="heart${server.id}.png" width="18" onerror="this.src='heart1.png'">
          <div>${server.name}</div>
        </div>
        <div class="desc">${server.desc}</div>
        <div class="actions">
          <div class="visits">${server.visits} visits</div>
          <div class="play-btn" onclick="joinServer('${server.code}')">Play</div>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

/* JOIN */
window.joinServer = async function(code) {
  const key = "lastVisit_" + code;
  const last = localStorage.getItem(key);
  const now = Date.now();

  if (!last || now - last > 600000) {
    const ref = doc(db, "servers", code);

    try {
      await updateDoc(ref, { visits: increment(1) });
    } catch {
      await setDoc(ref, { visits: 1 });
    }

    localStorage.setItem(key, now);
  }

  window.location.href = "server.html?code=" + code;
};

/* MODAL */
window.openModal = () => {
  document.getElementById("modal").style.display = "flex";
};

window.closeModal = () => {
  document.getElementById("modal").style.display = "none";
};

init();
</script>

</body>
</html>
