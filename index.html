<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  color: #2d0b4e;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  border-bottom: 2px solid #a855f7;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  height: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 15px 35px rgba(168,85,247,0.25);
  border: 2px solid transparent;
  display: flex;
  flex-direction: column;
  position: relative;
}

.card.trending { border: 2px solid red; }
.card.recommended { border: 2px solid cyan; }

/* BADGES */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 11px;
  color: white;
}

.badge.trending { background: red; }
.badge.recommended {
  background: linear-gradient(90deg, #00e5ff, #00ffa6);
  color: black;
}

/* IMAGE */
.bg {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

/* CONTENT */
.content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* NAME (NOT CUT) */
.name {
  font-weight: bold;
  font-size: 14px;
  word-break: break-word;
}

/* AUTHOR */
.author {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* CHECK IMAGE */
.check {
  width: 14px;
  height: 14px;
}

/* DESC */
.desc {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ACTIONS */
.actions {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.visits {
  font-size: 12px;
  opacity: 0.7;
}

.play-btn {
  padding: 10px 16px;
  border-radius: 12px;
  border: 2px solid #a855f7;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.4);
}

.modal-box {
  background: white;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  max-width: 320px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MCspace</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyD4...",
});
const db = getFirestore(app);

/* VERIFIED USERS */
const verifiedUsers = ["RedWorld"];

/* RECOMMENDED SERVERS */
const recommendedServers = ["M5R9X1NY"];

/* SERVERS */
let servers = [
  {
    id:1,
    name:"Erratic SMP",
    desc:"Good MultiCraft SMP with no areas, and more very cool features.",
    code:"M5R9X1NY",
    author:"RedWorld",
    bg:"bgs/bg1.png",
    heart:"hearts/hpvp.png"
  },
  {
    id:2,
    name:"Ronaldo Vs Messi",
    desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨",
    code:"KAAYBNDP",
    author:"Elder",
    bg:"bgs/bg2.png",
    heart:"hearts/hpvp.png"
  },
  {
    id:3,
    name:"FlatWorld",
    desc:"Creative server where you can build anything you want in a flat world environment.",
    code:"MCSRVR03",
    author:"Unknown",
    bg:"bgs/bg3.png",
    heart:"hearts/hc.png"
  },
  {
    id:4,
    name:"New Types PvP",
    desc:"Awesome PvP server with a lot of fun features and different gamemodes to try.",
    code:"JLIVC3V9",
    author:"Unknown",
    bg:"bgs/bg4.png",
    heart:"hearts/hpvp.png"
  },
  {
    id:5,
    name:"SMP12",
    desc:"In here, it's your job to have fun! The world is open, PvP is enabled, and it's a place where you can do anything!",
    code:"94D92LVD",
    author:"Jared12",
    bg:"bgs/bg5.png",
    heart:"hearts/hpvp.png"
  },
  {
    id:6,
    name:"Stone Simulator",
    desc:"In here, we live underground! You can mine, trade, and buy items from the shop using currencies like Stone, Cobblestone, and more.",
    code:"XX9IXQ6H",
    author:"Jared12",
    bg:"bgs/bg6.png",
    heart:"hearts/hpvp.png"
  },
  {
    id:7,
    name:"Parkour Cubicles",
    desc:"Try to beat all 36 challenging cubicles in this parkour server and escape if you can!",
    code:"QVZACNG5",
    author:"Jared12",
    bg:"bgs/bg7.png",
    heart:"hearts/hpvp.png"
  }
];

/* LOAD VISITS */
async function loadVisits(server){
  const snap = await getDoc(doc(db,"servers",server.code));
  server.visits = snap.exists()?snap.data().visits||0:0;
}

/* INIT */
async function init(){
  await Promise.all(servers.map(loadVisits));
  servers.sort((a,b)=>b.visits-a.visits);

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  servers.forEach(server=>{
    const recommended = recommendedServers.includes(server.code);
    const trending = !recommended && server.visits >= 5;
    const verified = verifiedUsers.includes(server.author);

    const card=document.createElement("div");
    card.className="card"+
      (recommended?" recommended":"")+
      (trending?" trending":"");

    card.innerHTML=`
      ${recommended?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${trending?'<div class="badge trending">TRENDING</div>':''}

      <img class="bg" src="${server.bg}" onerror="this.src='bgs/bg1.webp'">

      <div class="content">
        <div class="title-row">
          <img src="${server.heart}" width="18" onerror="this.src='hearts/heart1.webp'">
          <div class="name">${server.name}</div>
        </div>

        <div class="author">
          by ${server.author}
          ${verified?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${server.desc}</div>

        <div class="actions">
          <div class="visits">${server.visits} visits</div>
          <div class="play-btn" onclick="location.href='server.html?code=${server.code}'">Play</div>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

init();
</script>

</body>
</html>
