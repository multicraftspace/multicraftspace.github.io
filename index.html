<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCSpace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  color: #2d0b4e;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo {display:flex;align-items:center;gap:10px;}
.logo img {height:40px;}

.add-btn {
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
}
.add-btn:hover {
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

.card {
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  position:relative;
}

.card.trending {border:2px solid red;}
.card.recommended {border:2px solid cyan;}

.badge {
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  color:white;
}
.badge.trending {background:red;}
.badge.recommended {
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}

.bg {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content {padding:12px;display:flex;flex-direction:column;height:100%;}

.title-row {display:flex;gap:6px;align-items:center;}
.name {font-weight:bold;word-break:break-word;}

.author {
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
  display:flex;
  gap:5px;
  align-items:center;
}

.check {width:14px;height:14px;}

.desc {
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
}

.actions {
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.play-btn {
  padding:8px 14px;
  border-radius:10px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.2s;
}
.play-btn:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MCSpace</div>
  </div>

  <button class="add-btn" onclick="openModal()">+ Add my server</button>
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Add your server</h3>
    <p>DM @rwo1ld in discord</p>
    <button class="add-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const verifiedUsers = ["RedWorld"];
const recommendedServers = ["M5R9X1NY"];

/* ✅ ALL 7 SERVERS */
const servers = [
{id:1,name:"Erratic SMP",code:"M5R9X1NY",author:"RedWorld",desc:"Good SMP",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
{id:2,name:"Ronaldo Vs Messi",code:"KAAYBNDP",author:"Elder",desc:"PvP server",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
{id:3,name:"FlatWorld",code:"MCSRVR03",author:"Unknown",desc:"Creative world",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
{id:4,name:"New Types PvP",code:"JLIVC3V9",author:"Unknown",desc:"PvP modes",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
{id:5,name:"SMP12",code:"94D92LVD",author:"Jared12",desc:"Open SMP",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
{id:6,name:"Stone Simulator",code:"XX9IXQ6H",author:"Jared12",desc:"Mining server",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
{id:7,name:"Parkour Cubicles",code:"QVZACNG5",author:"Jared12",desc:"Parkour challenge",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
];

async function init(){
  const grid=document.getElementById("grid");

  for(const s of servers){
    const snap = await getDoc(doc(db,"servers",s.code));
    const visits = snap.exists()?snap.data().visits||0:0;
    const last = snap.exists()?snap.data().lastVisits||0:0;

    const growth = visits - last; // 🔥 speed-based trending

    const recommended = recommendedServers.includes(s.code);
    const trending = !recommended && growth > 2;

    const card=document.createElement("div");
    card.className="card"+(recommended?" recommended":"")+(trending?" trending":"");

    card.innerHTML=`
      ${recommended?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${trending?'<div class="badge trending">TRENDING</div>':''}

      <img class="bg" src="${s.bg}">
      <div class="content">
        <div class="title-row">
          <img src="${s.heart}" width="18">
          <div class="name">${s.name}</div>
        </div>

        <div class="author">
          by ${s.author}
          ${verifiedUsers.includes(s.author)?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${s.desc}</div>

        <div class="actions">
          <div>${visits} visits</div>
          <div class="play-btn" onclick="location.href='server.html?code=${s.code}'">Play</div>
        </div>
      </div>
    `;

    grid.appendChild(card);
  }
}

init();
</script>
</body>
</html>
