<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCSpace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body {
  margin:0;
  font-family:'MultiCraft', sans-serif;
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}

.add-btn,.play-btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
}
.add-btn:hover,.play-btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}
.add-btn:active,.play-btn:active{transform:scale(0.9);}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

.card{
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  display:flex;
  flex-direction:column;
  position:relative;
}

.card.trending{border:2px solid red;}
.card.recommended{border:2px solid cyan;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  color:white;
}
.badge.trending{background:red;}
.badge.recommended{
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.title-row{display:flex;gap:6px;align-items:center;}

.name{
  font-weight:bold;
  font-size:14px;
  word-break:break-word;
}

.author{
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
  display:flex;
  gap:5px;
  align-items:center;
}

.check{width:14px;}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.actions{
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.visits{
  font-size:12px;
  opacity:0.7;
  color:#2d0b4e;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.4);
  z-index:999;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MCSpace</div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add my server</button>
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Add your server</h3>
    <p>DM @rwo1ld in Discord to add your server.</p>
    <button class="add-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega",
  storageBucket:"mcspaceomega.firebasestorage.app",
  messagingSenderId:"984192110931",
  appId:"1:984192110931:web:d7392a9815ab248c6391a6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const verifiedUsers=["RedWorld"];
const recommendedServers=["M5R9X1NY"];

let servers=[
{id:1,name:"Erratic SMP",desc:"Good MultiCraft SMP with no areas, and more very cool features.",code:"M5R9X1NY",author:"RedWorld",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
{id:2,name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨",code:"KAAYBNDP",author:"Elder",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
{id:3,name:"FlatWorld",desc:"Creative Server",code:"MCSRVR03",author:"Unknown",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
{id:4,name:"New Types PvP",desc:"Awesome PvP server, with a lot fun features and gamemodes.",code:"JLIVC3V9",author:"Unknown",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
{id:5,name:"SMP12",desc:"In here, it's your job to have fun! The world open, PVP; it's a place where you can do anything!",code:"94D92LVD",author:"Jared12",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
{id:6,name:"Stone Simulator",desc:"In here, we live underground! Also, we buy items from The Shop! With currencies such as Stone, Cobblestone, and more!",code:"XX9IXQ6H",author:"Jared12",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
{id:7,name:"Parkour Cubicles",desc:"In here, YOU will try to beat the impossible 36 cubicles of the server to escape!",code:"QVZACNG5",author:"Jared12",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
];

async function loadVisits(s){
  const snap=await getDoc(doc(db,"servers",s.code));
  if(snap.exists()){
    const d=snap.data();
    s.visits=d.visits||0;
    s.lastVisits=d.lastVisits||0;
  } else {
    s.visits=0;
    s.lastVisits=0;
  }
  s.growth=s.visits-s.lastVisits;
}

// HANDLE HASH ROUTING (mtcspace.com/#/CODE)
const hash = window.location.hash;

if (hash.startsWith("#/")) {
  const code = hash.replace("#/", "").trim();

  if (code) {
    // redirect to server page
    window.location.href = "server.html?code=" + code;
  }
}

async function init(){
  await Promise.all(servers.map(loadVisits));

  // sort by VISITS (highest first)
  servers.sort((a, b) => (b.visits || 0) - (a.visits || 0));

  const maxGrowth=Math.max(...servers.map(s=>s.growth));

  servers.forEach(s=>{
    s.trending=!recommendedServers.includes(s.code) && s.growth>=Math.max(5,maxGrowth*0.7);
  });

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  servers.forEach(s=>{
    const verified=verifiedUsers.includes(s.author);

    const card=document.createElement("div");
    card.className="card"+
      (s.trending?" trending":"")+
      (recommendedServers.includes(s.code)?" recommended":"");

    card.innerHTML=`
      ${recommendedServers.includes(s.code)?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${s.trending?'<div class="badge trending">TRENDING</div>':''}

      <img class="bg" src="${s.bg}">
      <div class="content">
        <div class="title-row">
          <img src="${s.heart}" width="18">
          <div class="name">${s.name}</div>
        </div>

        <div class="author">
          by ${s.author}
          ${verified?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${s.desc}</div>

        <div class="actions">
          <div class="visits">${s.visits} visits</div>
          <div class="play-btn" onclick="joinServer('${s.code}')">Play</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

const COOLDOWN = 10 * 60 * 1000; // 10 min

window.joinServer = async function(code){
  const key = "visit_" + code;
  const now = Date.now();
  const last = localStorage.getItem(key);

  let canCount = true;

  if (last && now - last < COOLDOWN) {
    canCount = false;
  }

  if (canCount) {
    const ref = doc(db,"servers",code);

    try {
      await updateDoc(ref, { visits: increment(1) });
    } catch {
      await setDoc(ref, { visits: 1 });
    }

    localStorage.setItem(key, now);
  } else {
    console.log("Cooldown active, visit not counted");
  }

  location.href = "/#/"+code;
};

window.openModal=()=>modal.style.display="flex";
window.closeModal=()=>modal.style.display="none";

init();
</script>

</body>
</html>
