<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTCSpace</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
  gap:10px;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}

/* SEARCH */
.search{
  padding:10px 14px;
  border-radius:12px;
  border:2px solid #a855f7;
  outline:none;
  font-family:'MultiCraft';
  width:260px;
  transition:0.25s;
}
.search:focus{
  box-shadow:0 0 10px rgba(168,85,247,0.4);
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
  font-family:'MultiCraft';
}
.btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}
.btn:active{transform:scale(0.9);}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  position:relative;
  border-radius:20px;
  background:white;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  border:2px solid transparent;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
}

/* BADGES */
.card.trending{border:2px solid red;}
.card.recommended{border:2px solid cyan;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:6px 10px;
  border-radius:10px;
  font-size:11px;
  font-weight:bold;
  z-index:5;
}

.badge.trending{background:red;color:white;}
.badge.recommended{
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}

/* IMAGE */
.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.name{font-weight:bold;font-size:14px;}

.author{
  font-size:12px;
  opacity:0.7;
}

.check{width:14px;margin-left:4px;}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.actions{
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.visits{
  font-size:12px;
  opacity:0.7;
}

.fav{
  cursor:pointer;
  font-size:16px;
  margin-right:10px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.4);
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:300px;
}

.close{
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MTCSpace</div>
  </div>

  <input id="search" class="search" placeholder="Search servers...">

  <div>
    <button class="btn" onclick="openAdd()">+ Add my server</button>
    <button class="btn" onclick="contact()">📩</button>
    <button id="authBtn" class="btn" onclick="openAuth()">Sign Up</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<!-- AUTH -->
<div id="authModal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="authModal.style.display='none'">✖</span>
    <h3>Account</h3>
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <button class="btn" onclick="signup()">Sign Up</button>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyD...",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega"
});

const db=getFirestore(app);

const recommended=["M5R9X1NY"];
const verified=["RedWorld"];

let allServers=[];

/* AUTH */
function setUser(u){
  localStorage.setItem("user",u);
  authBtn.innerText=u;
}

window.signup=async()=>{
  const ref=doc(db,"users",user.value);
  if((await getDoc(ref)).exists()) return alert("Taken");
  await setDoc(ref,{password:pass.value});
  setUser(user.value);
  authModal.style.display="none";
};

window.login=async()=>{
  const snap=await getDoc(doc(db,"users",user.value));
  if(!snap.exists()) return alert("No user");
  if(snap.data().password!==pass.value) return alert("Wrong pass");
  setUser(user.value);
  authModal.style.display="none";
};

window.openAuth=()=>authModal.style.display="flex";

/* LOAD */
async function load(){
  const snap=await getDocs(collection(db,"servers"));
  allServers=[];

  snap.forEach(d=>{
    const s=d.data();
    s.code=d.id;
    s.growth=(s.visits||0)-(s.lastVisits||0);
    allServers.push(s);
  });

  render(allServers);
}

/* RENDER */
function render(list){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  const maxGrowth=Math.max(...list.map(s=>s.growth||0),1);

  list.sort((a,b)=>b.visits-a.visits);

  list.forEach(s=>{
    const trending=(s.growth||0)>maxGrowth*0.6;
    const isRec=recommended.includes(s.code);

    const favs=JSON.parse(localStorage.getItem("favs")||"[]");

    const card=document.createElement("div");
    card.className="card"+(trending?" trending":"")+(isRec?" recommended":"");

    card.innerHTML=`
      ${isRec?'<div class="badge recommended">★ RECOMMENDED</div>':''}
      ${trending?'<div class="badge trending">🔥 TRENDING</div>':''}

      <img class="bg" src="${s.bg||'bgs/bg1.png'}">
      <div class="content">
        <div class="name">${s.name}</div>

        <div class="author">
          by ${s.author}
          ${verified.includes(s.author)?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${s.desc}</div>

        <div class="actions">
          <div class="visits">${s.visits||0} visits</div>
          <div>
            <span class="fav" onclick="fav('${s.code}')">
              ${favs.includes(s.code)?"❤️":"🤍"}
            </span>
            <button class="btn" onclick="play('${s.code}')">Play</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

/* FAVORITES */
window.fav=function(code){
  let favs=JSON.parse(localStorage.getItem("favs")||"[]");
  favs.includes(code)?favs=favs.filter(x=>x!==code):favs.push(code);
  localStorage.setItem("favs",JSON.stringify(favs));
  render(allServers);
};

/* SEARCH */
search.oninput=()=>{
  const q=search.value.toLowerCase();
  render(allServers.filter(s=>s.name.toLowerCase().includes(q)));
};

/* PLAY */
const COOLDOWN=10*60*1000;

window.play=async(code)=>{
  const key="visit_"+code;
  const now=Date.now();

  if(!localStorage.getItem(key)||now-localStorage.getItem(key)>COOLDOWN){
    await updateDoc(doc(db,"servers",code),{visits:increment(1)});
    localStorage.setItem(key,now);
  }

  location.href="server.html?code="+code;
};

/* BUTTONS */
window.openAdd=()=>{
  if(!localStorage.getItem("user")){
    openAuth();
  }else{
    location.href="mailto:add@mtcspace.com";
  }
};

window.contact=()=>{
  location.href="mailto:contact@mtcspace.com";
};

load();
</script>

</body>
</html>
