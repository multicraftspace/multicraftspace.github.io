<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  color: #2d0b4e;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  border-bottom: 2px solid #a855f7;
}

.logo {
  font-size: 28px;
}

.top-btn {
  padding: 10px 15px;
  border: 2px solid #a855f7;
  border-radius: 10px;
  cursor: pointer;
}

.popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: white;
  border: 2px solid #a855f7;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  display: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 25px;
  padding: 30px;
}

.card {
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 15px 35px rgba(168,85,247,0.25);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.bg {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

.content {
  padding: 12px;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.title-row img {
  width: 20px;
}

.actions {
  margin-top: 10px;
  display: flex;
  justify-content: flex-end;
}

.play-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.play-btn:hover {
  transform: scale(1.1);
}

.play-btn:active {
  transform: scale(0.9);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">MCspace</div>
  <div class="top-btn" onclick="openPopup()">Add my server</div>
</div>

<div class="popup" id="popup">
  <div>DM @rwo1ld in discord, to add your server.</div>
  <button onclick="closePopup()">Close</button>
</div>

<div class="grid" id="grid"></div>

<script>
const servers = [
  { id: 1, name: "Test Server", code: "abc123" }
];

const grid = document.getElementById("grid");

servers.forEach(server => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img class="bg" src="bg${server.id}.png">
    <div class="content">
      <div class="title-row">
        <img src="heart${server.id}.png">
        <div>${server.name}</div>
      </div>
      <div class="actions">
        <div class="play-btn" onclick="joinServer('${server.code}')">Play</div>
      </div>
    </div>
  `;

  grid.appendChild(card);
});

function joinServer(code) {
  window.location.href = "server.html?code=" + code;
}

function openPopup() {
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
