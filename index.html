<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCSpace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft',sans-serif;
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}

.search{
  padding:10px;
  border-radius:12px;
  border:2px solid #a855f7;
  font-family:'MultiCraft';
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
  font-family:'MultiCraft';
}
.btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}
.btn:active{transform:scale(0.9);}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  display:flex;
  flex-direction:column;
  position:relative;
  transition:0.3s;
}
.card:hover{
  box-shadow:0 0 25px rgba(168,85,247,0.6);
}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.title-row{display:flex;gap:6px;align-items:center;}

.name{font-weight:bold;font-size:14px;}

.author{
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
  display:flex;
  gap:5px;
  align-items:center;
}

.check{width:14px;}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.actions{
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.visits{
  font-size:12px;
  opacity:0.7;
}

/* FAVORITE */
.fav{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MCSpace</div>
  </div>

  <input id="search" class="search" placeholder="Search...">

  <button class="btn" onclick="alert('DM @rwo1ld in Discord')">+ Add My Server</button>
</div>

<div id="grid" class="grid"></div>

<!-- ONLY SCRIPT PART CHANGED (keep your HTML/CSS) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega",
  storageBucket:"mcspaceomega.firebasestorage.app",
  messagingSenderId:"984192110931",
  appId:"1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const verifiedUsers = ["RedWorld"];
const recommendedServers = ["M5R9X1NY"];

/* ✅ FULL SERVERS (YOUR DESCRIPTIONS PRESERVED) */
let servers = [
{id:1,name:"Erratic SMP",desc:"Good MultiCraft SMP with no areas, survival gameplay, active players, and many cool features to explore with friends.",code:"M5R9X1NY",author:"RedWorld",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
{id:2,name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌 Includes parkour, PvP, minigames, BedWars, Manhunt, treasure hunt, bridging, axe PvP, and many more fun modes.",code:"KAAYBNDP",author:"Elder",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
{id:3,name:"FlatWorld",desc:"Creative server where you can freely build anything in a flat world environment without limits.",code:"MCSRVR03",author:"Unknown",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
{id:4,name:"New Types PvP",desc:"Awesome PvP server with many fun features, unique combat styles, and different gamemodes to enjoy.",code:"JLIVC3V9",author:"Unknown",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
{id:5,name:"SMP12",desc:"Open world SMP where you can explore, fight, build, and do anything you want with PvP enabled.",code:"94D92LVD",author:"Jared12",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
{id:6,name:"Stone Simulator",desc:"Underground survival server with economy. Mine stone, trade resources, and progress through a unique system.",code:"XX9IXQ6H",author:"Jared12",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
{id:7,name:"Parkour Cubicles",desc:"Challenge yourself by completing 36 difficult parkour cubicles and try to escape the impossible map.",code:"QVZACNG5",author:"Jared12",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
];

/* ✅ FAVORITES FIX */
function getFavs(){
  return JSON.parse(localStorage.getItem("favs") || "[]");
}
function toggleFav(code){
  let favs = getFavs();
  if(favs.includes(code)){
    favs = favs.filter(f => f !== code);
  } else {
    favs.push(code);
  }
  localStorage.setItem("favs", JSON.stringify(favs));
  init();
}

/* LOAD VISITS + GROWTH */
async function loadVisits(s){
  const snap = await getDoc(doc(db,"servers",s.code));
  if(snap.exists()){
    const d = snap.data();
    s.visits = d.visits || 0;
    s.lastVisits = d.lastVisits || 0;
  } else {
    s.visits = 0;
    s.lastVisits = 0;
  }
  s.growth = s.visits - s.lastVisits;
}

async function init(){
  await Promise.all(servers.map(loadVisits));

  /* SORT BY VISITS */
  servers.sort((a,b)=>b.visits-a.visits);

  /* TRENDING (SMART) */
  const maxGrowth = Math.max(...servers.map(s=>s.growth));
  servers.forEach(s=>{
    s.trending = !recommendedServers.includes(s.code) && s.growth >= Math.max(3, maxGrowth * 0.6);
  });

  const q = document.getElementById("search").value.toLowerCase();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  servers.filter(s=>s.name.toLowerCase().includes(q)).forEach(s=>{
    const verified = verifiedUsers.includes(s.author);
    const fav = getFavs().includes(s.code);

    const card = document.createElement("div");
    card.className = "card" +
      (s.trending?" trending":"") +
      (recommendedServers.includes(s.code)?" recommended":"");

    card.innerHTML = `
      ${recommendedServers.includes(s.code)?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${s.trending?'<div class="badge trending">TRENDING</div>':''}

      <div class="fav">${fav?"❤️":"🤍"}</div>

      <img class="bg" src="${s.bg}">
      <div class="content">
        <div class="title-row">
          <img src="${s.heart}" width="18">
          <div class="name">${s.name}</div>
        </div>

        <div class="author">
          by ${s.author}
          ${verified?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${s.desc}</div>

        <div class="actions">
          <div class="visits">${s.visits} visits</div>
          <div class="btn play">Play</div>
        </div>
      </div>
    `;

    /* FIXED EVENT LISTENERS */
    card.querySelector(".fav").onclick = ()=>toggleFav(s.code);
    card.querySelector(".play").onclick = ()=>joinServer(s.code);

    grid.appendChild(card);
  });
}

/* PLAY */
window.joinServer = async function(code){
  const ref = doc(db,"servers",code);
  try{await updateDoc(ref,{visits:increment(1)});}
  catch{await setDoc(ref,{visits:1});}
  location.href = "server.html?code=" + code;
};

document.getElementById("search").oninput = init;

init();
</script>

</body>
</html>
