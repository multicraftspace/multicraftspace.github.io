<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTCSpace</title>

<style>
@font-face {
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{height:40px;}

/* SEARCH */
.search{
  margin:15px auto;
  width:90%;
  max-width:500px;
}
.search input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:2px solid #a855f7;
  font-family:'MultiCraft';
}

/* BUTTONS */
.add-btn,.play-btn,.fav-btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
  font-family:'MultiCraft';
}
.add-btn:hover,.play-btn:hover,.fav-btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}
.add-btn:active,.play-btn:active,.fav-btn:active{
  transform:scale(0.9);
}

/* SUPPORT BUTTON */
.support{
  position:fixed;
  bottom:20px;
  right:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  display:flex;
  flex-direction:column;
  border:2px solid transparent;
}

/* BADGES */
.card.recommended{border:2px solid cyan;}
.card.trending{border:2px solid red;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  color:white;
}
.badge.recommended{
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}
.badge.trending{background:red;}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.title-row{display:flex;gap:6px;align-items:center;}

.name{font-weight:bold;font-size:14px;}

.author{
  font-size:12px;
  opacity:0.7;
  display:flex;
  align-items:center;
  gap:5px;
}

.check{width:14px;}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.actions{
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.visits{
  font-size:12px;
  opacity:0.7;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.4);
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MTCSpace</div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add my server</button>
</div>

<div class="search">
  <input id="search" placeholder="Search servers...">
</div>

<div id="grid" class="grid"></div>

<!-- SUPPORT BUTTON -->
<button class="add-btn support" onclick="alert('Need some help? Mail contact@mtcspace.com.')">
  📧 Support
</button>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Add your server</h3>
    <p>Mail add@mtcspace.com to add your server.</p>
    <button class="add-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega",
  storageBucket:"mcspaceomega.firebasestorage.app",
  messagingSenderId:"984192110931",
  appId:"1:984192110931:web:d7392a9815ab248c6391a6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const verifiedUsers=["RedWorld"];
const recommended=["M5R9X1NY"];

let servers=[
{id:1,name:"Erratic SMP",desc:"Good MultiCraft SMP with survival gameplay, no restrictions, active community and fun exploration.",code:"M5R9X1NY",author:"RedWorld",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
{id:2,name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌 Parkour, PvP, BedWars, Manhunt, Bridging, Axe PvP and many more gamemodes.",code:"KAAYBNDP",author:"Elder",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
{id:3,name:"FlatWorld",desc:"Creative sandbox server where you can build anything freely.",code:"MCSRVR03",author:"Unknown",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
{id:4,name:"New Types PvP",desc:"Unique PvP server with custom combat styles and fun modes.",code:"JLIVC3V9",author:"Unknown",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
{id:5,name:"SMP12",desc:"Open survival SMP where you can build, fight and explore freely.",code:"94D92LVD",author:"Jared12",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
{id:6,name:"Stone Simulator",desc:"Underground economy server with mining and trading systems.",code:"XX9IXQ6H",author:"Jared12",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
{id:7,name:"Parkour Cubicles",desc:"Complete 36 challenging parkour levels and escape.",code:"QVZACNG5",author:"Jared12",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
];

async function loadVisits(s){
  const snap=await getDoc(doc(db,"servers",s.code));
  if(snap.exists()){
    const d=snap.data();
    s.visits=d.visits||0;
    s.lastVisits=d.lastVisits||0;
  } else {
    s.visits=0;
    s.lastVisits=0;
  }
  s.growth=s.visits-s.lastVisits;
}

async function init(){
  await Promise.all(servers.map(loadVisits));

  // SORT by visits
  servers.sort((a,b)=>b.visits-a.visits);

  const maxGrowth=Math.max(...servers.map(s=>s.growth||0),1);

  servers.forEach(s=>{
    s.trending=!recommended.includes(s.code) && s.growth>=maxGrowth*0.6;
  });

  render(servers);
}

function render(list){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  list.forEach(s=>{
    const verified=verifiedUsers.includes(s.author);

    const favs=JSON.parse(localStorage.getItem("favs")||"[]");
    const isFav=favs.includes(s.code);

    const card=document.createElement("div");
    card.className="card"+
      (s.trending?" trending":"")+
      (recommended.includes(s.code)?" recommended":"");

    card.innerHTML=`
      ${recommended.includes(s.code)?'<div class="badge recommended">★ RECOMMENDED</div>':''}
      ${s.trending?'<div class="badge trending">🔥 TRENDING</div>':''}

      <img class="bg" src="${s.bg}">
      <div class="content">
        <div class="title-row">
          <img src="${s.heart}" width="18">
          <div class="name">${s.name}</div>
        </div>

        <div class="author">
          by ${s.author}
          ${verified?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${s.desc}</div>

        <div class="actions">
          <div class="visits">${s.visits} visits</div>
          <div>
            <button class="fav-btn" onclick="toggleFav('${s.code}')">${isFav?'★':'☆'}</button>
            <button class="play-btn" onclick="joinServer('${s.code}')">Play</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

/* SEARCH */
document.getElementById("search").oninput=e=>{
  const q=e.target.value.toLowerCase();
  render(servers.filter(s=>s.name.toLowerCase().includes(q)));
};

/* FAVORITES */
window.toggleFav=function(code){
  let favs=JSON.parse(localStorage.getItem("favs")||"[]");
  if(favs.includes(code)) favs=favs.filter(f=>f!==code);
  else favs.push(code);
  localStorage.setItem("favs",JSON.stringify(favs));
  init();
};

/* COOLDOWN */
const COOLDOWN=10*60*1000;

window.joinServer=async function(code){
  const key="visit_"+code;
  const now=Date.now();
  const last=localStorage.getItem(key);

  if(!last||now-last>COOLDOWN){
    const ref=doc(db,"servers",code);
    try{await updateDoc(ref,{visits:increment(1)});}
    catch{await setDoc(ref,{visits:1});}
    localStorage.setItem(key,now);
  }
  location.href="server.html?code="+code;
};

window.openModal=()=>modal.style.display="flex";
window.closeModal=()=>modal.style.display="none";

init();
</script>

</body>
</html>
